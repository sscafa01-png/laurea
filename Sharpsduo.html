<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei Ringraziamenti di Laurea</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            color: #800020; /* Un bel color bordeaux laurea */
            text-align: center;
        }
        .grazie-section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>A Samuel e Valentina </h1>
    
    <div class="grazie-section">
        <h3>Grazie perchè siete stati i primi a farmi sentire a casa mia in una casa che effettivamente, non era la mia. In una città che mi era completamente sconosciuta,
            e mi avete accettato come amico sin dal primo momento, o quanto meno mi avete fatto sentire come tale.
        </h3>
    </div>


</body>
</html>
